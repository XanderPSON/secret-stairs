version: 2
terraform_runner:
  build:
    engine: native_tf
    default:
      providers: null
  workspaces:
    terraform/pipelines: {}
    {{- if $.EnableCitadelWorkspace }}
    terraform/citadel: {}
    {{- end }}
    terraform/corporate:
      build:
        providers:
          configuration:
            aws:
              - account_alias: corporate
    terraform/infra-shared-dev:
      build:
        providers:
          configuration:
            aws:
              - account_alias: infra-shared-dev
        included_files:
          - terraform/main/locals.tf
          - terraform/main/main.tf
          - terraform/main/variables.tf
      watchlist:
        - terraform/main/
    {{- if and $.EnableDevelopmentConfiguration (not $.SetToInfraSharedDev) }}
    terraform/placeholder-dev-aws-account:
      build:
        providers:
          configuration:
            aws:
              - account_alias: placeholder-dev-aws-account
        included_files:
          - terraform/main/locals.tf
          - terraform/main/main.tf
          - terraform/main/variables.tf
      watchlist:
        - terraform/main/
    {{- end }}
    {{- if $.EnableStagingConfiguration }}
    terraform/placeholder-staging-aws-account:
      build:
        providers:
          configuration:
            aws:
              - account_alias: placeholder-staging-aws-account
        included_files:
          - terraform/main/locals.tf
          - terraform/main/main.tf
          - terraform/main/variables.tf
      watchlist:
        - terraform/main/
    {{- end }}
    {{- if $.EnableProductionConfiguration }}
    # Uncomment this workspace when you are ready to deploy your service to production!
    # terraform/placeholder-prod-aws-account:
    #   build:
    #     providers:
    #       configuration:
    #         datadog: {}
    #         aws:
    #           - account_alias: placeholder-prod-aws-account
    #     included_files:
    #       - terraform/main/locals.tf
    #       - terraform/main/main.tf
    #       - terraform/main/variables.tf
    #   watchlist:
    #     - terraform/main/
    {{- end }}
