apiVersion: v1
kind: Service
metadata:
  annotations:
    {{- with $.Values.mesh }}
    {{- if .enabled }}
    mesh.cbhq.net/enabled: "{{ .enabled }}"
    mesh.cbhq.net/hostname: "{{ .hostname }}"
    mesh.cbhq.net/ingress-port-mapping: "443:3001"
    {{- end }}
    {{- end }}
  name: secret-phrase
spec:
  ports:
    - name: nextjs
      port: 3001
      targetPort: 3001
      protocol: TCP
  selector:
    app.kubernetes.io/name: bootcamp-secret-phrase
    app.kubernetes.io/component: secret-phrase